 <!DOCTYPE html>
<html>
    <head>
        <style>
            .container{
                display:grid ;
                grid-template-columns: 100px 200px 100px 200px;
                background-color: rgb(75, 233, 228);
                padding:20px;
            }
            .container div{
                background-color: rgb(182, 231, 228);
                border: 5px solid rgba(235, 161, 233, 0.797);
                padding: 10px;
                font-size: 30px;
                text-align: center;
            }
        </style>
    </head>
    <h1>Grid layout</h1>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
    </div>
</html>
