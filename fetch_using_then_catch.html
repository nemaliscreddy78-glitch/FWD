<!DOCTYPE html>
<html>
<body>
<h1>JavaScript HTML DOM</h1>
<h2>The getElementById() Method</h2>
<h1 id="h1"></h1>
<h1 id="h2"></h1>
<script>
// Access a h1  Element
const myh1 = document.getElementById("h1");
// Change the content of the Element
myh1.innerHTML = "Hello I am h1 hearder element 1!";
// Access a h2  Element
const myh2 = document.getElementById("h2");
// Change the content of the Element
myh2.innerHTML = "Hello I am h2 hearder element 2!";
</script>

</body>
</html>
