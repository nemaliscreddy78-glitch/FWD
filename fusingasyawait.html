<!DOCTYPE html>
<html>
<body>
<h1>JavaScript HTML DOM</h1>
<h2>The getElementById() Method</h2>
<p id="p1"></p>
<p id="p2"></p>
<script>
// Access a paragraph Element
const mypara1 = document.getElementById("p1");
// Change the content of the Element
mypara1.innerHTML = "Hello I am paragraph 1!";
// Access a paragraph Element
const mypara2 = document.getElementById("p2");
// Change the content of the Element
mypara2.innerHTML = "Hello I am paragraph 2!";
</script>
</body>
</html>
