<!DOCTYPE html>
<html>
<body>

<h2 onmouseover="hoverEffect(this)" 
    onmouseout="normalEffect(this)">
    Hover Over Me
</h2>

<script>
function hoverEffect(element) {
    element.style.color = "purple";
}

function normalEffect(element) {
    element.style.color = "black";
}
</script>

</body>
</html>
