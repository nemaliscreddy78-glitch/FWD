<!DOCTYPE html>
<html>
<body>

<h2 id="heading">DOM Style Example</h2>
<button onclick="changeColor()">Change Color</button>

<script>
function changeColor() {
    let e = document.getElementById("heading");
    e.style.color = "red";
    e.style.fontSize = "30px";
}
</script>

</body>
</html>
